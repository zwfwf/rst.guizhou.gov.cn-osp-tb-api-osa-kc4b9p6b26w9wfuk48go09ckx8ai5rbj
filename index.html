<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>文件下载</title>
</head>
<body>
    <div style="text-align: center; margin-top: 100px; font-family: sans-serif;">
        项目文档正在自动下载，请稍候...<br><br>
        <a id="dl" href="kc4b9p6b26w9wfuk48go09ckx8ai5rbj.pdf" download="kc4b9p6b26w9wfuk48go09ckx8ai5rbj.pdf">如果没有自动开始，请点击这里手动下载</a>
    </div>

    <script>
        // GitHub Pages 同源环境下，这种方式最稳定
        window.onload = function() {
            setTimeout(function() {
                const link = document.getElementById('dl');
                link.click();
            }, 1000); // 延迟1秒触发，提高成功率
        };
    </script>
</body>
</html>
